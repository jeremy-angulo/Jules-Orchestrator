<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Jules Orchestrator</title>
  <link rel="icon" type="image/svg+xml" href="/assets/logo.svg" />
  <meta property="og:title" content="Jules Orchestrator" />
  <meta property="og:image" content="/assets/logo.svg" />
  <link rel="stylesheet" href="/assets/login.css" />
</head>
<body>
  <main class="auth-wrap">
    <section class="auth-card">
      <p class="eyebrow">Jules Orchestrator</p>
      <h1>Connexion dashboard</h1>
      <p class="muted" id="modeLabel">Connecte-toi avec ton compte.</p>

      <form id="authForm" class="stack">
        <label>
          Email
          <input id="email" type="email" required autocomplete="email" />
        </label>
        <label>
          Mot de passe
          <input id="password" type="password" required autocomplete="current-password" />
        </label>
        <button type="submit" class="btn" id="submitBtn">Se connecter</button>
      </form>

      <p class="feedback" id="feedback"></p>
    </section>
  </main>

  <script type="module" src="/assets/login.js"></script>
</body>
</html>

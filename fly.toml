app = "jules-orchestrator"
primary_region = "cdg"  # Paris — change to your nearest: https://fly.io/docs/reference/regions/

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  ORCHESTRATOR_DB_PATH = "/data/orchestrator.db"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "off"   # never sleep
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "jules_data"
  destination = "/data"
  initial_size = "1gb"
